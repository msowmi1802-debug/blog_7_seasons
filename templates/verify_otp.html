{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Verify Your OTP</h2>

    <p>
        Enter the 6-digit OTP sent to your email.
    </p>

    <form method="POST">

        <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            maxlength="6"
            required>

        <button type="submit">
            Verify OTP
        </button>

    </form>
    <p style="margin-top:15px;">
       Didn't receive the OTP?
       <a href="{{ url_for('resend_otp') }}">
          Resend OTP
       </a>
    </p>

</div>

{% endblock %}
