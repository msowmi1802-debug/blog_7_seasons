{% extends "base.html" %}

{% block content %}

<div class="form-container">

```
<h2>My Posts</h2>

{% if posts %}

    {% for post in posts %}

        <div class="post-card">

            <h3>{{ post["title"] }}</h3>

            <p>

                {{ post["category"] }}

                |

                {{ post["visibility"] }}

            </p>

            <p>

                {{ post["created_at"] }}

            </p>

           <a href="{{ url_for('view_post', post_id=post['id']) }}">
               Read
           </a>

           <a href="{{ url_for('edit_post', post_id=post['id']) }}">
               Edit
           </a>
           
          <form
              action="{{ url_for('delete_post', post_id=post['id']) }}"
              method="POST"
              style="display:inline;">

              <button
                  type="submit"
                  onclick="return confirm('Are you sure you want to delete this post?');">

                 Delete

                </button>

            </form>
            |

           

        </div>

        <hr>

    {% endfor %}

{% else %}

    <p>No posts yet.</p>

{% endif %}
```

</div>

{% endblock %}
