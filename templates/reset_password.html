{% extends "base.html" %}

{% block content %}

<div class="form-container">

```
<h2>Reset Password</h2>

<form method="POST">

    <input
        type="text"
        name="otp"
        placeholder="Enter OTP"
        required>

    <input
        type="password"
        name="password"
        placeholder="New Password"
        required>
    <ul>
     <li>Minimum 8 characters</li>
     <li>One uppercase letter</li>
     <li>One lowercase letter</li>
     <li>One number</li>
      <li>One special character</li>
    </ul>
    <input
        type="password"
        name="confirm_password"
        placeholder="Confirm Password"
        required>

    <button type="submit">
        Reset Password
    </button>

</form>
<a href="{{ url_for('resend_reset_otp') }}">
    Resend OTP
</a>
```

</div>

{% endblock %}
