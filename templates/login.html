{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required> 

        <div class="remember-me">
         <label>
               <input
                  type="checkbox"
                  name="remember_me">
               Remember Me
          </label>
        </div>

        <button type="submit">
            Login
        </button>
        <p style="margin-top:15px; text-align:center;">

            <a href="{{ url_for('forgot_password') }}">
              Forgot Password?
            </a>

       </p>

       <p style="text-align:center;">

          Don't have an account?

         <a href="{{ url_for('register') }}">
              Register
         </a>

      </p>

    </form>

</div>

{% endblock %}
